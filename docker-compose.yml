services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: wp-sentinel-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    volumes:
      - ./server/src:/app/src
      - ./server/server.js:/app/server.js
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wp-sentinel

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: wp-sentinel-worker
    restart: unless-stopped
    command: npx nodemon --watch src --legacy-watch --polling-interval 1000 src/workers/index.js
    env_file:
      - ./server/.env
    volumes:
      - ./server/src:/app/src
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wp-sentinel

  mongo:
    image: mongo:7
    container_name: wp-sentinel-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: wpsentinel
      MONGO_INITDB_ROOT_PASSWORD: Kx9mQ7vLp2wNrT4bZj8X
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "-u", "wpsentinel", "-p", "Kx9mQ7vLp2wNrT4bZj8X", "--authenticationDatabase", "admin", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wp-sentinel

  redis:
    image: redis:7-alpine
    container_name: wp-sentinel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass R3disP4ss8xYq2Wm
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "R3disP4ss8xYq2Wm", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wp-sentinel

volumes:
  mongo-data:
  redis-data:

networks:
  wp-sentinel:
    driver: bridge
